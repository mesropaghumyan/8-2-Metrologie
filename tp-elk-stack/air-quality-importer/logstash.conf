input {
  # stdin reçoit le contenu de Air_Quality.log via pipe (cat ... | logstash)
  # Logstash se termine automatiquement quand stdin reçoit EOF.
  stdin {
    codec => plain {
      charset => "UTF-8"
    }
  }
}

filter {
  # Parsing CSV
  csv {
    separator => ","
    columns => [
      "unique_id", "indicator_id", "name", "measure",
      "measure_info", "geo_type_name", "geo_join_id",
      "geo_place_name", "time_period", "start_date",
      "data_value", "msg_col"
    ]
  }

  # Ignorer la ligne d'en-tête
  if [unique_id] == "Unique ID" {
    drop {}
  }

  # Ignorer les lignes vides ou incomplètes
  if ![unique_id] or [unique_id] == "" {
    drop {}
  }

  # Mapper start_date → @timestamp
  date {
    match => ["start_date", "MM/dd/yyyy"]
    target => "@timestamp"
    remove_field => ["start_date"]
  }

  # Convertir les champs numériques
  mutate {
    convert => {
      "data_value"   => "float"
      "unique_id"    => "integer"
      "indicator_id" => "integer"
    }
    remove_field => ["message", "msg_col", "@version", "event", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch.elk.svc.cluster.local:9200"]
    index => "air-quality-%{+YYYY.MM.dd}"
  }
  # Affiche un point par document traité dans les logs du Job
  stdout { codec => dots }
}
