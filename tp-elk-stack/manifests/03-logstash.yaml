---
# Settings Logstash : ECS compatibility désactivé pour garder des noms de champs simples
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-settings
  namespace: elk
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    pipeline.ecs_compatibility: disabled
    queue.type: memory
---
# Pipeline : reçoit les logs de Filebeat, parse le JSON pino, indexe dans ES
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: elk
data:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }

    filter {
      # Les logs de coffee-app sont du JSON pur (pino).
      # Le champ "message" de Filebeat contient la ligne brute du container.
      json {
        source => "message"
        skip_on_invalid_json => true
      }

      # Mapper le champ "time" de pino vers @timestamp
      if [time] {
        date {
          match => ["time", "ISO8601"]
          target => "@timestamp"
          remove_field => ["time"]
        }
      }

      # Nettoyer les champs techniques de Filebeat inutiles dans Kibana
      mutate {
        remove_field => ["pid", "hostname", "@version", "ecs", "agent",
                         "input", "tags", "log", "stream"]
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "app-logs-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.19.16
        ports:
        - containerPort: 5044
          name: beats
        env:
        - name: LS_JAVA_OPTS
          value: "-Xmx256m -Xms256m"
        volumeMounts:
        - name: pipeline
          mountPath: /usr/share/logstash/pipeline/logstash.conf
          subPath: logstash.conf
        - name: settings
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "768Mi"
            cpu: "500m"
      volumes:
      - name: pipeline
        configMap:
          name: logstash-pipeline
      - name: settings
        configMap:
          name: logstash-settings
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: elk
spec:
  selector:
    app: logstash
  ports:
  - name: beats
    port: 5044
    targetPort: 5044
