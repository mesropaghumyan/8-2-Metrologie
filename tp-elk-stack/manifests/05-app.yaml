---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee-app
  namespace: elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coffee-app
  template:
    metadata:
      labels:
        app: coffee-app
    spec:
      containers:
      - name: app
        image: coffee-app:v1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: coffee-app
  namespace: elk
spec:
  type: NodePort
  selector:
    app: coffee-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30000
